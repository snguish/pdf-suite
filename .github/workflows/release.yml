name: Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      tag:
        description: Existing version tag to publish
        required: true

permissions:
  contents: write

jobs:
  windows-release:
    name: Build Windows release
    runs-on: windows-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v7
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.3.2
        with:
          enable-cache: true

      - name: Build portable application
        shell: pwsh
        run: .\scripts\build_windows.ps1

      - name: Package and checksum
        id: package
        shell: pwsh
        run: |
          $version = if ("${{ github.ref_type }}" -eq "tag") { "${{ github.ref_name }}" } else { "${{ inputs.tag }}" }
          $archive = "PDF-Suite-$version-Windows-x64.zip"
          Compress-Archive -LiteralPath "dist\PDF Suite" -DestinationPath $archive
          $hash = (Get-FileHash -Algorithm SHA256 -LiteralPath $archive).Hash.ToLowerInvariant()
          "$hash  $archive" | Set-Content -Encoding ascii SHA256SUMS.txt
          "tag=$version" >> $env:GITHUB_OUTPUT
          "archive=$archive" >> $env:GITHUB_OUTPUT

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          gh release create "${{ steps.package.outputs.tag }}" `
            "${{ steps.package.outputs.archive }}" SHA256SUMS.txt `
            --repo "${{ github.repository }}" `
            --title "PDF Suite ${{ steps.package.outputs.tag }}" `
            --generate-notes `
            --verify-tag
