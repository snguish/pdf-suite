name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    name: Windows tests
    runs-on: windows-latest
    timeout-minutes: 15

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true

      - name: Install dependencies
        run: uv sync --locked

      - name: Compile sources
        run: uv run python -m compileall -q app.pyw core ui scripts tests

      - name: Run tests
        shell: pwsh
        run: |
          $env:PDF_SUITE_TEST_TMP = Join-Path $env:RUNNER_TEMP "pdf-suite-tests"
          New-Item -ItemType Directory -Force $env:PDF_SUITE_TEST_TMP | Out-Null
          uv run python -m unittest discover -s tests -v
