name: Feature request
description: Suggest a focused improvement to PDF Suite.
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or workflow
      description: What PDF task is difficult today?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed improvement
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
  - type: checkboxes
    id: scope
    attributes:
      label: Scope acknowledgement
      options:
        - label: I understand visual signatures are not certificate-backed digital signatures.
